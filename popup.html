<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Marks</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <h1 class="title">Dynamic Marks</h1>
    <p class="subtitle">智能收藏夹管理</p>
    <button id="btn-settings" class="btn-settings" title="忽略名单管理">⚙</button>
  </header>

  <!-- Main view: tabs + panels -->
  <div id="main-view">
    <nav class="tabs">
      <button class="tab-btn active" data-tab="sort">
        <span class="tab-icon">📊</span>
        <span class="tab-label">排序</span>
      </button>
      <button class="tab-btn" data-tab="discover">
        <span class="tab-icon">🔍</span>
        <span class="tab-label">发现</span>
      </button>
      <button class="tab-btn" data-tab="cleanup">
        <span class="tab-icon">🧹</span>
        <span class="tab-label">清理</span>
      </button>
    </nav>

    <main class="content">

      <!-- Tab 1: 按热度排序 -->
      <section id="tab-sort" class="tab-panel active">
        <div class="card">
          <p class="card-desc">根据浏览频率，将每个文件夹内的书签按访问频次从高到低排列。常访问的书签会移到前面。</p>
          <button id="btn-sort" class="btn btn-primary">
            <span class="btn-text">一键按热度排序</span>
            <span class="btn-loader hidden"></span>
          </button>
        </div>
        <div id="sort-result" class="result hidden"></div>
      </section>

      <!-- Tab 2: 发现未收藏 -->
      <section id="tab-discover" class="tab-panel">
        <div class="card">
          <p class="card-desc">找出你经常访问但还没收藏的网站，提醒你添加到收藏夹。</p>
          <div class="options">
            <label class="option">
              <input type="radio" name="discoverPeriod" value="7" checked>
              <span>最近 7 天</span>
            </label>
            <label class="option">
              <input type="radio" name="discoverPeriod" value="30">
              <span>最近 30 天</span>
            </label>
            <label class="option">
              <input type="radio" name="discoverPeriod" value="90">
              <span>最近 90 天</span>
            </label>
          </div>
          <button id="btn-discover" class="btn btn-primary">
            <span class="btn-text">发现未收藏的网站</span>
            <span class="btn-loader hidden"></span>
          </button>
        </div>
        <div id="discover-result" class="result hidden"></div>
      </section>

      <!-- Tab 3: 清理无用书签 -->
      <section id="tab-cleanup" class="tab-panel">
        <div class="card">
          <p class="card-desc">按指定时间范围内的访问频次从低到高排列书签，访问越少的越靠前，帮你发现可清理的收藏。</p>
          <div class="options">
            <label class="option">
              <input type="radio" name="cleanupPeriod" value="7" checked>
              <span>最近 7 天</span>
            </label>
            <label class="option">
              <input type="radio" name="cleanupPeriod" value="30">
              <span>最近 30 天</span>
            </label>
            <label class="option">
              <input type="radio" name="cleanupPeriod" value="90">
              <span>最近 90 天</span>
            </label>
          </div>
          <button id="btn-cleanup" class="btn btn-primary">
            <span class="btn-text">按访问频次排列</span>
            <span class="btn-loader hidden"></span>
          </button>
        </div>
        <div id="cleanup-result" class="result hidden"></div>
      </section>

    </main>
  </div>

  <!-- Settings view: ignore list management -->
  <div id="settings-view" class="hidden">
    <header class="settings-header">
      <button id="btn-back" class="btn-back">◀ 返回</button>
      <span class="settings-title">忽略名单管理</span>
    </header>
    <div class="content">
      <div class="card">
        <p class="card-desc">被忽略的网站不会出现在对应功能的扫描结果中。</p>
      </div>
      <div id="ignore-discover-section" class="ignore-section">
        <h3 class="ignore-heading">📋 发现 — 忽略名单</h3>
        <div id="ignore-discover-list"></div>
      </div>
      <div id="ignore-cleanup-section" class="ignore-section">
        <h3 class="ignore-heading">📋 清理 — 忽略名单</h3>
        <div id="ignore-cleanup-list"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
